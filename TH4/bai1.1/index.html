<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bảng điểm sinh viên</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Quản lý điểm sinh viên</h2>

<div class="form">
    <input type="text" id="name" placeholder="Họ tên">
    <input type="number" id="score" placeholder="Điểm (0-10)">
    <button id="addBtn">Thêm</button>
</div>

<table border="1">
    <thead>
        <tr>
            <th>STT</th>
            <th>Họ tên</th>
            <th>Điểm</th>
            <th>Xếp loại</th>
            <th>Thao tác</th>
        </tr>
    </thead>

    <tbody id="tableBody"></tbody>
</table>

<p id="stats">Tổng SV: 0 | Điểm TB: 0</p>

<script src="script.js"></script>

</body>
</html>
