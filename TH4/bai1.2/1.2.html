<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bộ lọc & tìm kiếm sinh viên</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Quản lý điểm sinh viên</h2>

<div class="form">
    <input type="text" id="name" placeholder="Họ tên">
    <input type="number" id="score" placeholder="Điểm (0-10)">
    <button id="addBtn">Thêm</button>
</div>

<div class="filter">
    <input type="text" id="search" placeholder="Tìm kiếm tên...">

    <select id="rankFilter">
        <option value="all">Tất cả</option>
        <option value="Giỏi">Giỏi</option>
        <option value="Khá">Khá</option>
        <option value="Trung bình">Trung bình</option>
        <option value="Yếu">Yếu</option>
    </select>
</div>

<table border="1">
<thead>
<tr>
<th>STT</th>
<th>Họ tên</th>
<th id="scoreHeader" style="cursor:pointer">Điểm</th>
<th>Xếp loại</th>
<th>Thao tác</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<p id="stats"></p>

<script src="script.js"></script>

</body>
</html>
